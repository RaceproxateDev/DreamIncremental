<!DOCTYPE html>

<html>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <head>
        <title>Dream Incremental</title>
    </head>

    <body>
        <div id="world1" class="world">
            <h3 id="MemoriesDisplayTxt">Memory: 0 [+1/s]</h3>

            <section>
                <button class="tab" onclick="displayContent('Settings')">Settings</button>
                <button class="tab" onclick="displayContent('MemoryUpgrades')">Memory Upgrades</button>
                <button class="tab" onclick="displayContent('DreamReset')" style="background-image: linear-gradient(purple, pink, purple); border-color: purple; display: none;" id="DreamifyTab">Dreamify</button>
            </section>

            <div id="Settings" class="content" style="display: none;">
                <h3 style="text-align: center;">Settings</h3>
                <h3>Data</h3>
                <button class="tab" style="border: 2px solid green; color: green;" onclick="saveData()">Save</button>
                <button class="tab" style="border: 2px solid rgb(255, 0, 0); color: rgb(255, 0, 0);" onclick="resetData()">Hard Reset</button>
                <button class="tab" style="border: 2px solid rgb(0, 255, 242); color: rgb(0, 255, 242);" onclick="ExportData()">Export Save</button>
                <button class="tab" style="border: 2px solid rgb(0, 4, 255); color: rgb(0, 4, 255);" onclick="ImportData()">Import Save</button>
            </div>

            <div id="MemoryUpgrades" class="content" style="display: none;">
                <h3>Memory Upgrades</h3>

                <button class="BuyableBtn" id="MemoryBuyable1Btn" onclick="BuyUpg(1, 'Memory')">
                    +100% Memories [0/100]<br>
                    10 Memories
                </button>

                <button class="BuyableBtn" id="MemoryBuyable2Btn" onclick="BuyUpg(2, 'Memory')">
                    2x Memories [0/50]<br>
                    100 Memories
                </button>
                <br><br>

                <button class="BuyableBtn" id="MemoryUpgrade1Btn" onclick="buyOneTimeUpg(1, 'Memory', 1000)" style="background-image: linear-gradient(purple, pink, purple); border-color: purple;">
                    Unlock Dreams [0/1] [Permanent]<br>
                    1000 Memories
                </button>
            </div>

            <div class="content" id="DreamReset" style="display: none;">
                <h3 style="color: purple;">Dreamify</h3>
                <h3 style="color: purple">Dreamifying will reset your Memory and Memory Upgrades.</h3>
                <s style="color: purple;">Wake up</s>
                <h3 style="color: purple" id="CalcDreamsGainTxt">+0 Dreams on Reset</h3>
                <button style="background-image: linear-gradient(purple, pink, purple);" class="ResetLayerBtn" id="DreamifyResetBtn">Dreamify</button>
            </div>
        </div>


        <link rel="stylesheet" href="gameStyle/main.css">
        <script src="GameUtils/OmegaNum.js"></script>
        <script src="GameUtils/FormatterNum.js"></script>
        <script src="SaveGame.js"></script>
        <script src="GameUtils/Manager.js"></script>
        <script src="GameScripts/Memories.js"></script>
        <script src="GameScripts/UnlockContent.js"></script>
        <script src="GameScripts/Dreams.js"></script>
    </body>
</html>
